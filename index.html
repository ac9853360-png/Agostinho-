<!DOCTYPE html>
<html lang="pt-AO">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Motor Bioestatístico Pro</title>
    <style>
        :root {
            --bg: #0b1120; --surface: rgba(30, 41, 59, 0.7); --primary: #0ea5e9;
            --text: #f8fafc; --muted: #94a3b8; --success: #10b981; --danger: #f43f5e;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; height: 100dvh; display: flex; flex-direction: column; margin: 0; overflow: hidden; }
        
        nav { display: flex; gap: 10px; padding: 15px; overflow-x: auto; background: rgba(15, 23, 42, 0.9); border-bottom: 1px solid #1e293b; }
        .tab-btn { background: #1e293b; color: var(--muted); border: none; padding: 10px 20px; border-radius: 20px; white-space: nowrap; font-weight: 600; }
        .tab-btn.active { background: var(--primary); color: white; }
        
        main { flex: 1; overflow-y: auto; padding: 20px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }
        
        .card { background: var(--surface); backdrop-filter: blur(10px); padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #334155; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #475569; background: #0f172a; color: white; font-size: 16px; margin: 10px 0; }
        button.action { width: 100%; padding: 15px; border-radius: 12px; background: var(--primary); border: none; color: white; font-weight: 700; margin-top: 10px; }
        
        .resultado { margin-top: 20px; padding: 15px; border-radius: 12px; display: none; line-height: 1.6; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<nav>
    <button class="tab-btn active" onclick="switchTab('chi')">Qui-Quadrado</button>
    <button class="tab-btn" onclick="switchTab('reg')">Regressão</button>
    <button class="tab-btn" onclick="switchTab('anova')">ANOVA</button>
</nav>

<main>
    <!-- Qui-Quadrado -->
    <div id="chi" class="tab-content active">
        <h2>Qui-Quadrado de Independência</h2>
        <div class="card">
            <input type="number" id="chi2" step="0.01" placeholder="Valor de χ²">
            <input type="number" id="chi_p" step="0.0001" placeholder="Valor-p">
            <button class="action" onclick="calcChi()">Interpretar Resultado</button>
            <div id="res-chi" class="resultado"></div>
        </div>
    </div>

    <!-- Regressão -->
    <div id="reg" class="tab-content">
        <h2>Regressão e Correlação</h2>
        <div class="card">
            <input type="number" id="r2" step="0.01" placeholder="Coeficiente de Determinação (R²)">
            <input type="number" id="reg_p" step="0.0001" placeholder="Valor-p">
            <button class="action" onclick="calcReg()">Interpretar Resultado</button>
            <div id="res-reg" class="resultado"></div>
        </div>
    </div>

    <!-- ANOVA -->
    <div id="anova" class="tab-content">
        <h2>ANOVA (Análise de Variância)</h2>
        <div class="card">
            <input type="number" id="f_stat" step="0.01" placeholder="Estatística F">
            <input type="number" id="anova_p" step="0.0001" placeholder="Valor-p">
            <button class="action" onclick="calcAnova()">Interpretar Resultado</button>
            <div id="res-anova" class="resultado"></div>
        </div>
    </div>
</main>

<script>
    function switchTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function show(id, text, isSig) {
        const el = document.getElementById(id);
        el.style.display = 'block';
        el.style.background = isSig ? 'rgba(16, 185, 129, 0.2)' : 'rgba(244, 63, 94, 0.2)';
        el.style.borderLeft = `5px solid ${isSig ? '#10b981' : '#f43f5e'}`;
        el.innerHTML = text;
        if(navigator.vibrate) navigator.vibrate(isSig ? 100 : 200);
    }

    function calcChi() {
        const p = parseFloat(document.getElementById('chi_p').value.replace(',', '.'));
        const chi = document.getElementById('chi2').value;
        const isSig = p < 0.05;
        const msg = isSig ? `<strong>Significativo (p < 0.05):</strong> Existe uma associação estatisticamente relevante entre as variáveis categóricas. O valor de χ² (${chi}) sugere que as frequências observadas divergem do acaso.` 
                          : `<strong>Não Significativo:</strong> Não há evidências para rejeitar a hipótese de independência. As variáveis parecem ser independentes na amostra.`;
        show('res-chi', msg, isSig);
    }

    function calcReg() {
        const p = parseFloat(document.getElementById('reg_p').value.replace(',', '.'));
        const r2 = parseFloat(document.getElementById('r2').value.replace(',', '.'));
        const isSig = p < 0.05;
        const msg = isSig ? `<strong>Modelo Significativo:</strong> O R² de ${r2} explica ${r2*100}% da variância. O valor-p ${p} confirma que o modelo preditivo é robusto para a população.`
                          : `<strong>Modelo Não Significativo:</strong> O p-valor (${p}) indica que a relação observada pode ser fruto do acaso. O modelo não é confiável para predições populacionais.`;
        show('res-reg', msg, isSig);
    }

    function calcAnova() {
        const p = parseFloat(document.getElementById('anova_p').value.replace(',', '.'));
        const f = document.getElementById('f_stat').value;
        const isSig = p < 0.05;
        const msg = isSig ? `<strong>Diferença Detectada (p < 0.05):</strong> Existe uma diferença significativa entre as médias dos grupos (F=${f}). <em>Recomendação: Execute um teste post-hoc (ex: Tukey) para identificar qual par de grupos difere.</em>`
                          : `<strong>Sem Diferença Significativa:</strong> As médias dos grupos não apresentam diferenças estatísticas. A variação observada é compatível com o ruído biológico basal.`;
        show('res-anova', msg, isSig);
    }
</script>
</body>
</html>
